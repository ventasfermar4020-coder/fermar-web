services:
  fermar-web:
    image: postgres
    restart: always
    container_name: fermar-web
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: fermar
      POSTGRES_PASSWORD: fermar123
      POSTGRES_DB: fermar
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres

volumes:
  postgres:
